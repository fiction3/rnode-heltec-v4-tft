; PlatformIO configuration for RNode_Firmware on Heltec WiFi LoRa 32 V4
; Mirrors arduino-cli build: esp32:esp32:esp32s3:CDCOnBoot=cdc, ESP32 core 2.0.17
; Source files live at project root (not in src/) — src_dir = . preserves layout

[platformio]
src_dir = .
default_envs = heltec_wifi_lora_32_V4

[env:heltec_wifi_lora_32_V4]
platform = espressif32 @ 6.7.0
framework = arduino
board = esp32-s3-devkitc-1

board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.flash_mode = qio
board_build.flash_size = 8MB
board_build.partitions = default_8MB.csv
board_upload.flash_size = 8MB
board_upload.maximum_size = 8388608

build_flags =
    -DBOARD_MODEL=0x3F
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_MANUFACTURER=\"Heltec\"
    -DARDUINO_USB_PRODUCT=\"RNode\"
    -I.

build_src_filter =
    +<*.ino>
    +<*.cpp>
    +<*.c>
    -<build/>
    -<Builds/>
    -<Release/>
    -<Documentation/>
    -<Console/>
    -<Python Module/>

upload_speed = 921600
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time

lib_deps =
    adafruit/Adafruit GFX Library @ ^1.11.9
    adafruit/Adafruit ST7735 and ST7789 Library @ ^1.10.3
    rweather/Crypto @ ^0.4.0
    WiFi
    WebServer
    FS
    SPIFFS

lib_ldf_mode = chain+
lib_compat_mode = soft
